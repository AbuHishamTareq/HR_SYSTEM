name: CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "22"
  FLUTTER_VERSION: "3.41"

jobs:
  # ── Quality checks (run in parallel) ────────────────────

  backend-quality:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, pdo, pdo_sqlite, bcmath, json, xml, curl
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Pint (lint)
        run: ./vendor/bin/pint --test

      - name: Run tests (Pest)
        run: php artisan test

  crm-quality:
    name: CRM (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run oxlint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc -b

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: crm-build
          path: crm/dist/
          retention-days: 7

  customer-app-quality:
    name: Customer App (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  driver-app-quality:
    name: Driver App (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: driver-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ── Build artifacts (depends on quality checks) ────────

  backend-build:
    name: Backend build artifact
    runs-on: ubuntu-latest
    needs: [backend-quality]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, pdo, pdo_sqlite, bcmath, json, xml, curl
          coverage: none

      - name: Install dependencies (no dev)
        run: composer install --no-dev --no-progress --prefer-dist --optimize-autoloader

      - name: Prepare production env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Optimize Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/
          retention-days: 7

  # ── Deploy (placeholder — configure your target) ───────

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - crm-quality
      - customer-app-quality
      - driver-app-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: /tmp/deploy/backend

      - name: Download CRM artifact
        uses: actions/download-artifact@v4
        with:
          name: crm-build
          path: /tmp/deploy/crm

      - name: Deploy to production
        run: |
          echo "================================================"
          echo "  DEPLOY PLACEHOLDER"
          echo "================================================"
          echo ""
          echo "Configure your deployment target below. Examples:"
          echo ""
          echo "  ▶ Laravel Forge:"
          echo "      https://forge.laravel.com/servers"
          echo ""
          echo "  ▶ Vapor (serverless Laravel):"
          echo "      https://vapor.laravel.com"
          echo ""
          echo "  ▶ SSH + rsync:"
          echo "      rsync -avz --delete /tmp/deploy/backend/ user@host:/var/www/html/"
          echo "      rsync -avz --delete /tmp/deploy/crm/ user@host:/var/www/html/crm/"
          echo ""
          echo "  ▶ Flutter (App Store / Play Store):"
          echo "      Fastlane match + gym + deliver / supply"
          echo ""
          echo "================================================"
